# ExternalSecret — 외부 시크릿 저장소(AWS Secrets Manager/SSM 등)의 값을
# 'flink-unified-job-secrets' k8s Secret 으로 동기화한다.
# FlinkDeployment 의 envFrom.secretRef 가 이 Secret 을 읽어 env 로 주입한다.
#
# 사전: 클러스터에 External Secrets Operator + (Cluster)SecretStore 가 구성돼 있어야 함.
# TODO: secretStoreRef.name / remoteRef.key(.property) 를 실제 저장소에 맞게 채울 것.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: flink-unified-job-secrets
  namespace: flink
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: REPLACE_WITH_SECRET_STORE   # TODO: ClusterSecretStore/SecretStore 이름
    kind: ClusterSecretStore          # 또는 SecretStore
  target:
    name: flink-unified-job-secrets   # 생성될 Secret 이름 (Deployment 의 secretRef 와 동일해야 함)
    creationPolicy: Owner
  data:
    - secretKey: S3_OUTPUT_PATH        # 잡이 읽는 env 키
      remoteRef:
        key: REPLACE_WITH_REMOTE_SECRET     # TODO: 원격 시크릿 경로/이름
        property: s3_output_path            # TODO: 해당 시크릿 안의 필드명
    - secretKey: OPENSEARCH_HOST
      remoteRef:
        key: REPLACE_WITH_REMOTE_SECRET
        property: opensearch_host
    - secretKey: CHECKPOINT_DIR
      remoteRef:
        key: REPLACE_WITH_REMOTE_SECRET
        property: checkpoint_dir
    # 필요 시 OpenSearch 인증도 동일하게 추가:
    # - secretKey: OPENSEARCH_USERNAME
    #   remoteRef: { key: REPLACE_WITH_REMOTE_SECRET, property: opensearch_username }
    # - secretKey: OPENSEARCH_PASSWORD
    #   remoteRef: { key: REPLACE_WITH_REMOTE_SECRET, property: opensearch_password }
