plugins {
    id 'java'
    id 'application'
}

group = 'com.factory'
version = '1.0.0'

repositories {
    mavenCentral()
}

ext {
    flinkVersion = '1.18.1'
    jacksonVersion = '2.15.2'
    lombokVersion = '1.18.30'
}

dependencies {
    // Flink Streaming core (using implementation to run directly from IDE)
    implementation "org.apache.flink:flink-streaming-java:${flinkVersion}"
    implementation "org.apache.flink:flink-clients:${flinkVersion}"

    // Flink Connectors
    implementation "org.apache.flink:flink-connector-kafka:3.0.1-1.18"

    // Jackson JSON
    implementation "com.fasterxml.jackson.core:jackson-databind:${jacksonVersion}"
    implementation "com.fasterxml.jackson.datatype:jackson-datatype-jsr310:${jacksonVersion}"

    // Lombok
    compileOnly "org.projectlombok:lombok:${lombokVersion}"
    annotationProcessor "org.projectlombok:lombok:${lombokVersion}"

    // Logging
    implementation 'org.slf4j:slf4j-api:2.0.9'
    implementation 'org.slf4j:slf4j-simple:2.0.9'
}

application {
    mainClass = 'com.factory.flink.FlinkAnomalyDetectionJob'
}

jar {
    manifest {
        attributes 'Main-Class': 'com.factory.flink.FlinkAnomalyDetectionJob'
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}
